timezone: Asia/Singapore

report_policy:
  max_items_per_ticker: 5
  max_news_per_ticker: 3
  max_critical_alerts_per_day: 10
  max_low_materiality_items: 20
  only_show_fresh_news_days: 7
  stale_news_days: 14
  weekly_extended_watchlist_day: Sunday

global_settings:
  enable_public_news_fallback: true
  enable_google_news_rss: true
  enable_investor_relations_rss: true
  enable_sec_edgar: true
  enable_yfinance: true
  no_buy_sell_recommendations: true

